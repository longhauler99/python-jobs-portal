{% extends "base.html" %}

{% block title %}Login | Pata Job{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

<div style="width: 100%; max-width: 520px;">
  <div class="card border-0 shadow-lg rounded-4">
    <div class="card-body p-4">

      <h2 class="text-center mb-1 fw-bold">Welcome Back</h2>
      <p class="text-center text-muted mb-4">Login to continue to Pata Job</p>

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label for="id_email" class="form-label fw-semibold">Email Address</label>
          <input
            type="email"
            name="email"
            id="id_email"
            class="form-control"
            placeholder="john@example.com"
            required
          >
        </div>

        <div class="mb-2">
          <label for="id_password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input
              type="password"
              name="password"
              id="id_password"
              class="form-control"
              placeholder="Enter your password"
              required
            >
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('id_password')">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">
              Remember me
            </label>
          </div>

          <a href="#" class="small text-decoration-none">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
          Login
        </button>
      </form>

      <div class="text-center my-3">
        <small class="text-muted">OR</small>
      </div>

      <p class="text-center mb-0">
        Don’t have an account?
        <a href="{% url 'signup' %}" class="fw-semibold text-decoration-none">Create one</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
  }
</script>
{% endblock %}
