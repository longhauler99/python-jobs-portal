{% extends "base.html" %}
{% block content %}
<div class="container my-5" style="max-width: 500px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Sign Up</h2>

      <form method="post" novalidate>
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-3">
          <label for="id_username" class="form-label">Username</label>
          <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="id_email" class="form-label">Email</label>
          <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email">
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="id_password" class="form-label">Password</label>
          <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Sign Up</button>
      </form>

      <p class="mt-3 text-center">
        Already have an account? 
        <a href="{% url 'login' %}">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
