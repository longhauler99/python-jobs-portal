{% extends "base.html" %}
{% block content %}
<div class="container my-5" style="max-width: 600px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Apply for {{ job.title }}</h2>

      <form method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}

        <!-- Cover Letter -->
        <div class="mb-3">
          <label for="id_cover_letter" class="form-label">Cover Letter</label>
          <textarea name="cover_letter" id="id_cover_letter" class="form-control" rows="5" placeholder="Write your cover letter here..." required></textarea>
        </div>

        <!-- Resume Upload -->
        <div class="mb-3">
          <label for="id_resume" class="form-label">Upload Resume</label>
          <input type="file" name="resume" id="id_resume" class="form-control" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-success w-100">Submit Application</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
